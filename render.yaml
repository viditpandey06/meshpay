services:
  - type: web
    name: meshpay-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 4000
      - key: FRONTEND_ORIGINS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: IDEMPOTENCY_TTL_SECONDS
        value: 86400
      - key: PACKET_MAX_AGE_SECONDS
        value: 86400
